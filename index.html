<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Wedding – RSVP</title>

  <!-- Google Font (optional) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: #faf7f2;
      color: #333;
      text-align: center;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1529634806980-8c8c1a1e4d5b') center/cover no-repeat;
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      margin: 0;
    }

    .section {
      padding: 50px 20px;
      max-width: 700px;
      margin: auto;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .date {
      font-size: 1.2rem;
      color: #7a6f63;
      margin-bottom: 30px;
    }

    .button {
      display: inline-block;
      padding: 14px 28px;
      background: #c7a17a;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 1.1rem;
      margin-top: 20px;
    }

    .button:hover {
      background: #b38f6c;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 0.9rem;
      color: #7a7a7a;
    }
  </style>
</head>

<body>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Martin & [Partner]</h1>
  </div>

  <!-- Intro -->
  <div class="section">
    <h2>We’re Getting Married</h2>
    <p class="date">Saturday • 12 July 2025 • Tongeren</p>
    <p>
      We would love to celebrate this special day with you.  
      Please let us know if you will be joining us.
    </p>

    <!-- Placeholder button for later -->
    <a class="button" href="#">RSVP Coming Soon</a>
  </div>

  <!-- Location -->
  <div class="section">
    <h2>Location</h2>
    <p>
      Ceremony & Reception  
      <br><strong>[Venue Name]</strong>  
      <br>[Address]
    </p>
  </div>

  <footer>
    With love, Gwen & Martin
  </footer>

</body>
</html>
