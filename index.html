<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Wedding – RSVP</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
    body {
     background:#F9F0E7; 
      margin: 0;
      padding: 0;
     font-family: 'Marcellus', serif;
      color: #948D6E;
      text-align: center;
    }

    /* LANGUAGE BAR */
    .lang-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      background: #FBF4EC;
      padding: 1rem 1rem;
    }
    .lang-btn {
      padding: 0.25rem 1rem;
      border-radius: 20px;
      border: 1px solid #FB747A;
      background: #FEE7EA;
      cursor: pointer;
      color : #FB747A;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .lang-btn.active {
      background: #FB747A;
      color: #F9F0E7;
      border-color: #FB747A;
    }
    /* Gwen & Martin section */ 
    .hero {
      aspect-ratio: 2.5;
      background-image: url('icons/hero.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: auto 100%;
      margin-bottom: 50px;
    }
    
    .hero h1 
    {
    color : #F5F2E3;
    text-shadow: 2px 5px 0px #F47445, 4px 10px rgba(244, 116, 69, 0.5);
    font-size: 3.5rem;
    }
    /* Information section */
    .section {
    margin: auto;
    }
    h1 {
      aspect-ratio: 5;
      background-image: url('icons/planning.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: auto 100%;
    
    }
    h2 {
      font-size: 2rem;
      
    }
    .date {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }
    .button {
      display: inline-block;
      border: 1px solid #AEAC8D;
      background: #FFFBE6;
      padding: 14px;
      text-decoration: none;
      border-radius: 6px;
      font-size: 1.1rem;
      margin-top: 20px;
      margin-bottom: 50px;
    }
    .button:hover {
    background: #AEAC8D;
    color: #F9F0E7;
    }

    @media (max-width: 768px) {
      .hero {
        aspect-ratio: 1.5;
      }
      .section h1{
        aspect-ratio: 1.5;
      }
    }
  </style>
</head>
<body>
  <!-- LANGUAGE BAR -->
  <div class="lang-bar">
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="nl">NL</button>
  </div>

  <!-- Hero Section -->
  <div class="hero"></div>

  <!-- Intro -->
  <div class="section">
    <h2 data-i18n="title"></h2>

    <p class="date">
      <span data-i18n="date"></span>
    </p>

    <p data-i18n="intro"></p>

    <a class="button" id="rsvp-btn" data-i18n="rsvp"></a>
  </div>

  <!-- Location -->
  <div class="section">
    <h1 id="planning"> </h1>
    <p data-i18n="bot"></p>
  </div>

  <!-- LANGUAGE SWITCHING SCRIPT -->
  <script>
    const translations = {
      en: {
        title: "We’re getting married!",
        date: "Saturday • 5 September 2026 • Tongeren",
        intro: "We would love to celebrate this special day with you. Please let us know before 17 august if you will be joining us.",
        rsvp: "Let us know",
        bot: "Parking in the surrounding streets.<br><br>Your presence is the greatest gift of all. <br>If you would still like to surprise us, you can help us get a little closer to our next adventure. <br>&#x1F4E9; or THIEBAUT-MUNSTERS BE05 7380 4685 6375"
      },
      fr: {
        title: "Nous nous marions!",
        date: "Samedi • 5 septembre 2026 • Tongres",
        intro: "Nous serions ravis de célébrer cette journée spéciale avec vous. Merci de nous dire avant le 17 août si vous serez présents.",
        rsvp: "Informez nous",
        bot: "Le stationnement se fait dans les rues avoisinantes.<br><br>Votre présence est le plus beau des cadeaux. <br>Si vous souhaitez malgré tout nous faire plaisir, vous pouvez nous aider à nous rapprocher de notre prochaine aventure. <br>&#x1F4E9; ou THIEBAUT-MUNSTERS BE05 7380 4685 6375"
      },
      nl: {
        title: "Wij gaan trouwen!",
        date: "Zaterdag • 5 september 2026 • Tongeren",
        intro: "We zouden het geweldig vinden om deze speciale dag met jullie te vieren. Laat ons weten voor 17 augustus of je erbij bent.",
        rsvp: "Laat ons weten",
        bot:  "Parkeren kan in de omliggende straten.<br><br>Jullie aanwezigheid is het mooiste cadeau. <br>Wie ons toch wil verrassen, mag ons zeker een stukje dichter bij ons volgend avontuur helpen. <br>&#x1F4E9; of THIEBAUT-MUNSTERS BE05 7380 4685 6375"
      }
    };

  // Helper to read nested keys like "location.title"
  function getNested(obj, path) {
    return path.split('.').reduce((o, k) => o[k], obj);
  }

  const buttons = document.querySelectorAll(".lang-btn");
  const elements = document.querySelectorAll("[data-i18n]");
  const rsvpBtn = document.getElementById("rsvp-btn");
  const planning = document.getElementById("planning");

  // Get language from URL (?lang=xx) or default to EN
  const params = new URLSearchParams(window.location.search);
  let currentLang = params.get("lang") || "en";

  function setActiveButton(lang) {
    buttons.forEach(b => {
      b.classList.toggle("active", b.dataset.lang === lang);
    });
  }

  function updateLanguage(lang) {
    currentLang = lang;

    // Update all text
    elements.forEach(el => {
      const key = el.dataset.i18n;
      el.innerHTML = getNested(translations[lang], key);

    // update planning image.
    planning.style.backgroundImage = `url('icons/planning_${lang}.png')`;
    });

    // Update RSVP button link
    if (rsvpBtn) {
      rsvpBtn.onclick = () => {
        window.location.href = `poll.html?lang=${currentLang}`;
      };
    }

    // Update URL without reloading
    const url = new URL(window.location.href);
    url.searchParams.set("lang", lang);
    window.history.replaceState({}, "", url);

    setActiveButton(lang);
  }

  // Language button clicks
  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      updateLanguage(btn.dataset.lang);
    });
  });

  // Initial load
  updateLanguage(currentLang);
</script>
</body>
</html>
