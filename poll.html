<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Wedding – Poll</title>

  <!-- Fonts -->
  <link href="https://fonts.cdnfonts.com/css/bukhari-script" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Marcellus', serif;
      color: #948D6E;
      text-align: center;
      background: #F9F0E7;
    }

    /* LANGUAGE BAR */
    .lang-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem 1rem; 
    }
    .lang-btn {
      padding: 0.25rem 1rem;
      border-radius: 20px;
      border: 1px solid #FB747A;
      background: #FEE7EA;
      cursor: pointer;
      color: #FB747A;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .lang-btn.active {
      background: #FB747A;
      color: #F9F0E7;
      border-color: #FB747A;
    }

    .section {
      max-width: 600px;
      margin: 2rem auto;
      padding: 0 1.5rem 2.5rem;
    }

    h1 {
      aspect-ratio: 1.75;
      background-image: url('icons/planning.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: auto 100%;
    }

    form {
      text-align: left;
      margin-top: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 0.6rem 0.7rem;
      border-radius: 6px;
      border: 1px solid #948D6E;
      font-family: 'Marcellus', serif;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .button {
      display: inline-block;
      border: 1px solid #948D6E;
      background: #FFFBE6;
      padding: 12px 20px;
      color: #948D6E;
      text-decoration: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
    }

    .button:hover {
      background: #948D6E;
      color: #F9F0E7;
    }
    @media (max-width: 768px) {
     .section h1{
        aspect-ratio: 1.5;
      }
    }

  </style>
</head>

<body>

  <!-- LANGUAGE BAR -->
  <div class="lang-bar">
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="nl">NL</button>
  </div>

  <div class="section">
    <h1 id="planning"></h1>

    <h2 data-i18n="poll.title"></h2>

    <!-- VISIBLE FORM -->
    <form id="poll-form">
      <label data-i18n="poll.attending.label"></label>
    <label><input type="checkbox" id="drink"><span data-i18n="poll.attending.drink"></span></label>
    <label><input type="checkbox" id="party"><span data-i18n="poll.attending.party"></span></label>
    <label><input type="checkbox" id="none"><span data-i18n="poll.attending.none"></span></label>
  
      <label data-i18n="poll.names.label"></label>
      <input type="text" name="names" id="names" required />

      <label data-i18n="poll.guests.label"></label>
      <input type="number" name="guests" id="guests" min="0" max="10" required/>
      
      <label data-i18n="poll.children.label"></label>
      <input type="number" name="children" id="children" min="0" max="10" required/>
      
        <label data-i18n="poll.allergies.label"></label>
      <textarea name="allergies" id="allergies"></textarea>

      <label data-i18n="poll.message.label"></label>
      <textarea name="message" id="message"></textarea>

      <button type="submit" class="button" data-i18n="poll.submit"></button>
    </form>
  </div>
  <form
    id="appsScriptForm"
    action="https://script.google.com/macros/s/AKfycbzIgEdhVr-ScUBlZnP-sM704uQg7HAjnOO4Bs9-FIOId_ljRXpl1ErOte6n8nt4JJLJnA/exec"
    method="POST"
    target="hidden_iframe">

    <input type="hidden" name="attending" id="as_attending">
    <input type="hidden" name="names" id="as_names">
    <input type="hidden" name="guests" id="as_guests">
    <input type="hidden" name="children" id="as_children">
    <input type="hidden" name="allergies" id="as_allergies">
    <input type="hidden" name="message" id="as_message">

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>
  <script>
    const translations = {
      en: {
        poll: {
          title: "Details of your presence",
          attending: { label: "Will you be joining us?",
            drink: "Bubbles & bites (walking dinner) ",
            party: "Time to party" ,
            none: "Unfortunatly, we cannot attend."},
          names: { label: "Your name(s)" },
          guests: { label: "How many adults in total (including you)?" },
          children: {label: "How many childeren in total (excluding you)?"},
          allergies: { label: "Any allergies or dietary requirements?" },
          message: { label: "Anything else you'd like us to know?" },
          submit: "Send response"
        }
      },
      fr: {
        poll: {
          title: "Détails de votre présence",
          attending: { label: "Serez-vous présents ?",
            drink: "Bulles & walking dinner",
            party: "Soirée dansante",
            none: "Malheureusement nous ne pouvons pas participer."},
          names: { label: "Votre nom / noms" },
          guests: { label: "Combien d'adultes au total (vous compris)?" },
          children: {label : "Combien d'enfants au total (vous exclus)?"},
          allergies: { label: "Allergies ou régimes particuliers?" },
          message: { label: "Autre chose que vous souhaitez nous dire?" },
          submit: "Envoyer la réponse"
        }
      },
      nl: {
        poll: {
          title: "Details van uw aanwezigheid",
          attending: { label: "Komen jullie naar het feest?",
            drink: "Bubbles & bites (walking dinner)",
            party: "Tijd om te vieren",
            none: "We kunnen spijtig genoeg niet deelnemen."},
          names: { label: "Naam/namen" },
          guests: { label: "Met hoeveel volwassenen in totaal (inclusief jezelf)?" },
          children: {label: "Met hoeveel kinderen in totaal (exclusief jezelf)?"},
          allergies: { label: "Allergieën of speciale dieetwensen?" },
          message: { label: "Nog iets dat je met ons wil delen?" },
          submit: "Antwoord versturen"
        }
      }
    };

    function getNested(obj, path) {
      return path.split('.').reduce((o, k) => o && o[k], obj);
    }

    const buttons = document.querySelectorAll(".lang-btn");
    const elements = document.querySelectorAll("[data-i18n]");
    const params = new URLSearchParams(window.location.search);
    const drink = document.getElementById("drink");
    const party = document.getElementById("party");
    const none = document.getElementById("none");
    const planning = document.getElementById("planning");
    const iframe = document.querySelector('iframe[name="hidden_iframe"]');

    let currentLang = params.get("lang") || "en";
    let submissionPending = false;

    function setActiveButton(lang) {
      buttons.forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
    }

    function updateLanguage(lang) {
      currentLang = lang;

      elements.forEach(el => {
        const key = el.dataset.i18n;
        const value = getNested(translations[lang], key);
        if (value !== undefined) el.innerHTML = value;
      });

      const url = new URL(window.location.href);
      url.searchParams.set("lang", lang);
      window.history.replaceState({}, "", url);
      // update planning image.
      planning.style.backgroundImage = `url('icons/planning_${lang}.png')`;
      setActiveButton(lang);
    }
    // multiple choice logic 
    none.addEventListener("change", function () {
      if (this.checked) {
        drink.checked = false;
        party.checked = false;
        }
    });
    drink.addEventListener("change", function () {
      if (this.checked) none.checked = false;
    });
    party.addEventListener("change", function () {
      if (this.checked) none.checked = false;
    });


    // Listen for the Apps Script response
    iframe.onload = function () {
      // Ignore the iframe's initial load
      if (!submissionPending) return;
      submissionPending = false;
      // Redirect only after Apps Script has responded
      window.location.href = `thankyou.html?lang=${currentLang}`;
    };
    
    // FORM SUBMISSION
  document.getElementById("poll-form").addEventListener("submit", function (e) {
    e.preventDefault();
    // Prevent double-clicks
    if (submissionPending) return;
    submissionPending = true;
    const selected = [];
    if (drink.checked) selected.push("drink");
    if (party.checked) selected.push("party");
    if (none.checked) selected.push("cannot_attend");

    document.getElementById("as_attending").value = selected.join(",");
    document.getElementById("as_names").value = document.getElementById("names").value;
    document.getElementById("as_guests").value = document.getElementById("guests").value;
    document.getElementById("as_children").value = document.getElementById("children").value;
    document.getElementById("as_allergies").value = document.getElementById("allergies").value;
    document.getElementById("as_message").value = document.getElementById("message").value;

    // Optional: disable the submit button while sending
    const submitButton = this.querySelector('button[type="submit"]');
    submitButton.disabled = true;

    // Submit to Apps Script
    document.getElementById("appsScriptForm").submit();
    });

buttons.forEach(btn => btn.addEventListener("click", () => updateLanguage(btn.dataset.lang)));
updateLanguage(currentLang);
  </script>
</body>
</html>
